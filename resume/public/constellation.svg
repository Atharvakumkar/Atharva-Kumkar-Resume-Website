<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Connections -->
  <g stroke="white" stroke-width="1.5" opacity="0.3">

    <!-- Main Backbone -->
    <line x1="180" y1="470" x2="420" y2="390"/>
    <line x1="420" y1="390" x2="760" y2="450"/>
    <line x1="760" y1="450" x2="1050" y2="330"/>
    <line x1="1050" y1="330" x2="1380" y2="280"/>
    <line x1="1380" y1="280" x2="1730" y2="430"/>

    <!-- Alternate Routes -->
    <line x1="420" y1="390" x2="620" y2="220"/>
    <line x1="620" y1="220" x2="1050" y2="330"/>

    <line x1="760" y1="450" x2="920" y2="680"/>
    <line x1="920" y1="680" x2="1380" y2="280"/>

    <line x1="1380" y1="280" x2="1550" y2="620"/>
    <line x1="1550" y1="620" x2="1730" y2="430"/>

    <!-- Lower Backbone -->
