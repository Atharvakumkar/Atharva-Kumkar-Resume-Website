    <circle cx="760" cy="450" r="8"/>
    <circle cx="1050" cy="330" r="9"/>
    <circle cx="1380" cy="280" r="8"/>
    <circle cx="1730" cy="430" r="7"/>

   
    <circle cx="1550" cy="620" r="6"/>

    <circle cx="320" cy="760" r="5"/>
    <circle cx="620" cy="820" r="5"/>
    <circle cx="1280" cy="770" r="5"/>

  </g>

  <!-- Glow Rings -->
  <g opacity="0.1" stroke="white" fill="none">
    <circle cx="760" cy="450" r="20"/>
    <circle cx="1050" cy="330" r="28"/>
    <circle cx="1380" cy="280" r="20"/>
  </g>

  <!-- Background Stars -->
  <g fill="white" opacity="0.18">

    <circle cx="90" cy="130" r="1"/>
    <circle cx="250" cy="210" r="1.5"/>
    <circle cx="510" cy="120" r="1"/>
    <circle cx="830" cy="90" r="1.5"/>
    <circle cx="1170" cy="110" r="1"/>
    <circle cx="1500" cy="150" r="1.5"/>
    <circle cx="1800" cy="100" r="1"/>

    <circle cx="200" cy="920" r="1"/>
    <circle cx="500" cy="980" r="1.5"/>
    <circle cx="850" cy="940" r="1"/>
    <circle cx="1180" cy="980" r="1"/>
    <circle cx="1460" cy="930" r="1.5"/>
    <circle cx="1780" cy="980" r="1"/>

    <circle cx="1600" cy="300" r="1"/>
    <circle cx="1450" cy="500" r="1"/>
    <circle cx="700" cy="150" r="1"/>
    <circle cx="980" cy="850" r="1.5"/>

  </g>

